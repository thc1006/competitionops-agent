apiVersion: apps/v1
kind: Deployment
metadata:
  name: competitionops-api
spec:
  # H2 — Pinned to 1 replica.
  #
  # ``_plan_repo()`` in ``src/competitionops/main.py`` defaults to
  # ``InMemoryPlanRepository`` (a process-bound dict). With >1 pod and
  # the in-memory adapter, a plan created on pod A is invisible to
  # pod B, so ``POST /plans/{plan_id}/approve`` returns 404 whenever
  # the LB lands the approval on a different pod than the one that
  # handled ``POST /plans/generate``.
  #
  # Both halves of the dependency are now shipped in-tree:
  #
  #   1. ``FilePlanRepository`` — opted in via ``PLAN_REPO_DIR``
  #      (commented placeholder in ``base/configmap.yaml`` points at
  #      ``/var/lib/competitionops/audit/plans`` — a SUBDIR of the
  #      existing audit PVC mount so lifting this pin needs zero new
  #      infra). Atomic-rename save means multi-pod readers see only
  #      complete files. Mirrors Tier 0 #4's ``AUDIT_LOG_DIR``.
  #   2. H3 closed — ``FileAuditLog`` now writes to
  #      ``<plan_id>.<writer_id>.jsonl`` (writer_id defaults to the
  #      pod's hostname / ``metadata.name``), so each pod owns its
  #      own file. No shared resource ⇒ no torn-write risk regardless
  #      of RWX filesystem semantics. ``list_for_plan`` merges across
  #      all writers (and the legacy ``<plan_id>.jsonl`` form, for
  #      in-place upgrades).
  #
  # The pin nevertheless stays at 1 as a deployment-policy default —
  # operators MUST flip ``PLAN_REPO_DIR`` on first, confirm the build
  # contains the H3 fix in ``adapters/file_audit.py``, then bump this
  # number. The ``podAntiAffinity`` block below activates the moment
  # replicas climbs.
  replicas: 1
  template:
    spec:
      affinity:
        # Spread intent retained for the day H2 unblocks scaling — a
        # no-op while replicas=1 but lights up immediately when bumped.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: competitionops
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname
