apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: competitionops-api
  namespace: competitionops-staging
  annotations:
    # cert-manager wires this to a ClusterIssuer for automatic TLS.
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - competitionops-staging.example.invalid
      secretName: competitionops-staging-tls
  rules:
    - host: competitionops-staging.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: competitionops-api
                port:
                  name: http
