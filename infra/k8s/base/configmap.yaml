apiVersion: v1
kind: ConfigMap
metadata:
  name: competitionops-config
  namespace: competitionops
data:
  # Application
  APP_ENV: production
  APPROVAL_REQUIRED: "true"
  DRY_RUN_DEFAULT: "true"

  # Tier 0 #4 — audit log persistence directory. Matches the PVC mount
  # in deployment.yaml (or the emptyDir in the dev overlay).
  AUDIT_LOG_DIR: /var/lib/competitionops/audit

  # OTel — overlays set OTEL_EXPORTER_OTLP_ENDPOINT to the cluster's
  # collector. Without it, Sprint 6 wiring stays silent (Proxy
  # MeterProvider, no exporter attached).
  OTEL_SERVICE_NAME: competitionops-api
