# TEMPLATE ONLY — never commit a real secret value. Each ``stringData``
# field is intentionally empty. Real values flow in via one of:
#
# - external-secrets.io (recommended for cloud KMS)
# - Sealed Secrets (commit encrypted, decrypt in-cluster)
# - kubectl create secret generic --from-literal=...  (manual; staging)
#
# The Settings.SecretStr fields (Tier 0 #2) mask these even if a
# misconfigured logger ever dumps them.
#
# Round-3 H2 — empty strings here resolve to "feature disabled" at
# the Settings layer:
#   - PLANE_BASE_URL empty → PlaneAdapter stays in mock mode (the
#     URL validator treats "" as None, see ``config.py``)
#   - PLANE_API_KEY / WORKSPACE_SLUG / PROJECT_ID empty → real mode
#     never activates (real_mode requires ALL four set; partial
#     config falls back to mock)
# Operators can therefore apply this template unmodified for first-
# time bring-up without CrashLoopBackoff — pod boots, mock adapters
# serve traffic, real values get patched in via the secret-flow
# mechanism above.

apiVersion: v1
kind: Secret
metadata:
  name: competitionops-secrets
  namespace: competitionops
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""
  GOOGLE_OAUTH_CLIENT_ID: ""
  GOOGLE_OAUTH_CLIENT_SECRET: ""
  PLANE_API_KEY: ""
  PLANE_BASE_URL: ""
  PLANE_WORKSPACE_SLUG: ""
  PLANE_PROJECT_ID: ""
